<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esports Match Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- API-nyckel varning (visas om ingen nyckel är satt) -->
  <div id="api-warning" class="api-warning" hidden>
    Du behöver en API-nyckel. Öppna <code>script.js</code> och ersätt <code>YOUR_PANDASCORE_API_TOKEN</code> med din nyckel från
    <a href="https://pandascore.co" target="_blank" rel="noopener">pandascore.co</a>.
  </div>

  <header>
    <h1>Esports Match Tracker</h1>
    <p>Kommande matcher i League of Legends &amp; Counter-Strike</p>
  </header>

  <main>
    <!-- League of Legends -->
    <section id="lol-section">
      <h2>
        <span class="section-badge lol-badge">LoL</span>
        Kommande League of Legends-matcher
      </h2>
      <div id="lol-matches" class="match-grid"></div>
      <div id="lol-spinner" class="spinner-container">
        <div class="spinner"></div>
      </div>
      <div id="lol-error" class="error-message" hidden></div>
    </section>

    <!-- Counter-Strike -->
    <section id="cs-section">
      <h2>
        <span class="section-badge cs-badge">CS</span>
        Kommande Counter-Strike-matcher
      </h2>
      <div id="cs-matches" class="match-grid"></div>
      <div id="cs-spinner" class="spinner-container">
        <div class="spinner"></div>
      </div>
      <div id="cs-error" class="error-message" hidden></div>
    </section>
  </main>

  <footer>
    <p>Matchdata från <a href="https://pandascore.co" target="_blank" rel="noopener">PandaScore API</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
